services:
  - type: web
    name: media-downloader-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && pip install -U yt-dlp"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-app.web.app,https://your-app.firebaseapp.com
    plan: starter